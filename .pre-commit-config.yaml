# Config for pre-commit CI https://pre-commit.ci/
ci:
  autofix_commit_msg: |
    [pre-commit.ci] Automatic linting and formatting fixes
  autofix_prs: true
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate hooks"
  autoupdate_schedule: monthly
  skip:
    - prettier
    - stylelint

repos:
  - repo: "https://github.com/astral-sh/ruff-pre-commit"
    rev: "v0.15.12"
    hooks:
      - id: ruff
        args: [--exit-non-zero-on-fix]
      - id: ruff-format

  - repo: "https://github.com/asottile/pyupgrade"
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py37-plus]

  - repo: "https://github.com/Riverside-Healthcare/djLint"
    rev: v1.36.4
    hooks:
      - id: djlint-jinja
        types_or: ["html"]

  - repo: "https://github.com/PyCQA/doc8"
    rev: v2.0.0
    hooks:
      - id: doc8

  - repo: "https://github.com/kynan/nbstripout"
    rev: "0.9.1"
    hooks:
      - id: nbstripout

  - repo: "https://github.com/mondeja/pre-commit-po-hooks"
    rev: v1.7.3
    hooks:
      - id: remove-metadata

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: 'npm run prettier:files'
        language: node
        types_or: [json, ts, tsx, javascript, jsx, css, scss]
        exclude: .+\.html|webpack\.config\.js|tests/test_a11y/

      - id: stylelint
        name: stylelint
        entry: 'npm run stylelint:files'
        language: node
        types: [scss]

  - repo: "https://github.com/pre-commit/pre-commit-hooks"
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
